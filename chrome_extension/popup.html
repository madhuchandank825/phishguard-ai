<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PhishGuard AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --surface: #0d1520;
      --border: #1a2a40;
      --accent: #00e5ff;
      --danger: #ff3a6e;
      --warn: #ffb800;
      --safe: #00e676;
      --text: #e8f4fd;
      --muted: #5a7a99;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 360px;
      background: var(--bg);
      font-family: 'Space Mono', monospace;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .wrap { position: relative; z-index: 1; padding: 18px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #0055ff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 14px rgba(0,229,255,0.45);
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 14px rgba(0,229,255,0.4); }
      50%      { box-shadow: 0 0 26px rgba(0,229,255,0.75); }
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 800;
    }
    .logo-name span { color: var(--accent); }
    .badge {
      font-size: 9px; color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 20px; letter-spacing: 1px;
    }

    /* URL Card */
    .url-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .url-label {
      font-size: 9px; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 6px;
      text-transform: uppercase;
    }
    .url-text {
      font-size: 11px; color: var(--accent);
      word-break: break-all; line-height: 1.5;
    }

    /* Scan Button */
    .scan-btn {
      width: 100%;
      background: linear-gradient(135deg, #0040cc, #0077ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 14px;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .scan-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,119,255,0.4); }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    /* Result Card */
    .result-card {
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid transparent;
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .result-card.safe    { background: rgba(0,230,118,0.08); border-color: rgba(0,230,118,0.3); }
    .result-card.warning { background: rgba(255,184,0,0.08); border-color: rgba(255,184,0,0.3); }
    .result-card.danger  { background: rgba(255,58,110,0.08); border-color: rgba(255,58,110,0.3); }
    .result-card.caution { background: rgba(255,140,0,0.08); border-color: rgba(255,140,0,0.3); }

    .result-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .result-emoji { font-size: 28px; }
    .result-label {
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 800;
    }
    .safe    .result-label { color: var(--safe); }
    .warning .result-label { color: var(--warn); }
    .danger  .result-label { color: var(--danger); }
    .caution .result-label { color: #ff8c00; }

    .result-msg { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }

    /* Risk bar */
    .risk-bar-wrap { margin-bottom: 12px; }
    .risk-bar-label {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); margin-bottom: 5px;
    }
    .risk-bar-track {
      height: 6px; background: var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
      width: 0;
    }

    /* Flags */
    .flags-title {
      font-size: 9px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 8px;
    }
    .flag-item {
      display: flex; align-items: flex-start; gap: 7px;
      font-size: 10px; color: #c0d0e0;
      margin-bottom: 5px; line-height: 1.5;
    }
    .flag-dot {
      width: 5px; height: 5px;
      border-radius: 50%; background: var(--warn);
      margin-top: 4px; flex-shrink: 0;
    }
    .no-flags { font-size: 10px; color: var(--safe); }

    /* Loading */
    .loading {
      display: none; flex-direction: column;
      align-items: center; padding: 20px 0;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

    /* Stats row */
    .stats-row {
      display: flex; gap: 10px; margin-bottom: 14px;
    }
    .stat-box {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 10px;
      text-align: center;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--accent);
    }
    .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

    /* Error */
    .error-card {
      background: rgba(255,58,110,0.08);
      border: 1px solid rgba(255,58,110,0.3);
      border-radius: 10px; padding: 14px;
      font-size: 11px; color: #ff8fa3;
      display: none; line-height: 1.6;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 9px; color: var(--muted);
      padding-top: 10px;
      border-top: 1px solid var(--border);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-name">Phish<span>Guard</span> AI</div>
    </div>
    <div class="badge">v1.0</div>
  </div>

  <!-- Current URL -->
  <div class="url-card">
    <div class="url-label">Current Page</div>
    <div class="url-text" id="currentUrl">Loading...</div>
  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scanBtn">🔍 Scan This URL</button>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-value" id="totalScanned">0</div>
      <div class="stat-label">SCANNED</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="totalBlocked" style="color:var(--danger)">0</div>
      <div class="stat-label">THREATS</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="totalSafe" style="color:var(--safe)">0</div>
      <div class="stat-label">SAFE</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">ANALYZING URL...</div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-top">
      <div class="result-emoji" id="resultEmoji"></div>
      <div>
        <div class="result-label" id="resultLabel"></div>
      </div>
    </div>
    <div class="result-msg" id="resultMsg"></div>

    <div class="risk-bar-wrap">
      <div class="risk-bar-label">
        <span>Phishing Risk</span>
        <span id="riskPct">0%</span>
      </div>
      <div class="risk-bar-track">
        <div class="risk-bar-fill" id="riskBar"></div>
      </div>
    </div>

    <div class="flags-title">Detected Signals</div>
    <div id="flagsList"></div>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Footer -->
  <div class="footer">PhishGuard AI • Protected by Machine Learning</div>

</div>
<script src="js/popup.js"></script>
</body>
</html>
